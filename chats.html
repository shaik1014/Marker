<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CINEWARD</title>
  <link rel="stylesheet" href="chats.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

  <script src="script.js" defer></script>
</head>
<body class="chat-body">
  <div class="logo">
    <a href="index.html">
      <img src="logo.jpg" alt="Logo" class="logopos">
    </a>

    <!-- 🔙 Back to Home Button -->
    <button id="backToHomeBtn" class="themebutton">Home</button>

    <div class="group-name" id="groupNameHeader"></div>

    <div class="theme-button">
      <button class="themebutton" onclick="window.location.href='profile.html'">Profile</button>
    </div>
  </div>

  <div class="main-chat">
    <div id="chatbox" class="chatbox"></div>

    <div class="message-input">
      <input type="text" id="msg" placeholder="Type your message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</body>
</html>
