<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Group Chats</title>
  <link rel="stylesheet" href="home.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <div class="header">
      <h1 class="active-tab">Chats</h1>
      <div class="tabs">
        <button class="tab-button">Events</button>
        <button class="tab-button">AI</button>
      </div>
      <div class="profile-button">
        <img src="https://randomuser.me/api/portraits/men/75.jpg" alt="Profile" />
      </div>
    </div>

    <!-- Chats List -->
    <div class="chat-list">
      <div class="chat-item" onclick="location.href='chats.html?group=branch'">
        <div class="chat-avatar">
          <img src="https://randomuser.me/api/portraits/men/1.jpg" alt="Branch" />
        </div>
        <div class="chat-details">
          <h2>Branch Group</h2>
        </div>
      </div>

      <div class="chat-item" onclick="location.href='chats.html?group=project'">
        <div class="chat-avatar">
          <img src="https://randomuser.me/api/portraits/women/2.jpg" alt="Project" />
        </div>
        <div class="chat-details">
          <h2>Project Team</h2>
        </div>
      </div>

      <div class="chat-item" onclick="location.href='chats.html?group=alumni'">
        <div class="chat-avatar">
          <img src="https://randomuser.me/api/portraits/men/3.jpg" alt="Alumni" />
        </div>
        <div class="chat-details">
          <h2>Alumni Group</h2>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
